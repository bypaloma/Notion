<!DOCTYPE html>
<html>
<head>
  <title>Paloma Widgets</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #fff;
      text-align: center;
    }

    h1 {
      margin-bottom: 5px;
    }

    p {
      color: #666;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: #fff0f3;
      padding: 20px;
      border-radius: 12px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 14px;
      background: #e85d75;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    a:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>My Notion Widgets</h1>
  <p>Simple tools for focus, planning, and productivity.</p>

  <div class="grid">

    <div class="card">
      <h2>Pomodoro Timer</h2>
      <a href="./pomodoro/index.html" target="_blank">Open</a>
    </div>

    <div class="card">
      <h2>Pomodoro Mini</h2>
      <a href="./pomodoro-mini/index.html" target="_blank">Open</a>
    </div>

    <div class="card">
      <h2>Calculator</h2>
      <a href="./calculator/index.html" target="_blank">Open</a>
    </div>

    <div class="card">
      <h2>Timer</h2>
      <a href="./timer/index.html" target="_blank">Open</a>
    </div>

  </div>

</body>
</html>
