<!DOCTYPE html>
<html>
<head>
  <title>Paloma Notion Widgets</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--  Google Font (clean + aesthetic) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Lexend', sans-serif;
      background: #ac2a13;
      color: #2b2b2b;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 60px 20px;
    }

    .title {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: #7a7a7a;
      margin-top: 8px;
      margin-bottom: 40px;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #f3c1cc;
      margin: 30px auto;
      border-radius: 10px;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 20px;
    }

    .card {
      background: #ff9797;
      border: 1px solid #f3e6ea;
      padding: 18px;
      border-radius: 16px;
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #f3c1cc;
      box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    }

    .card h2 {
      font-size: 16px;
      margin: 0;
      font-weight: 500;
    }

    .card p {
      font-size: 13px;
      color: #8a8a8a;
      margin: 6px 0 12px;
    }

    a {
      display: inline-block;
      padding: 8px 14px;
      background: #f3c1cc;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-size: 13px;
      transition: 0.2s ease;
    }

    a:hover {
      background: #e8aebb;
    }

    .footer {
      margin-top: 50px;
      font-size: 12px;
      color: #b0b0b0;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="title">Paloma Widgets</div>
    <div class="subtitle">soft tools for focus, flow & intention</div>

    <div class="divider"></div>

    <div class="grid">

      <div class="card">
        <h2>Pomodoro Timer</h2>
        <p>minimal focus timer for deep work</p>
        <a href="./pomodoro/index.html" target="_blank">open</a>
      </div>

      <div class="card">
        <h2>Pomodoro Mini</h2>
        <p>compact version for quick sessions</p>
        <a href="./pomodoro-mini/index.html" target="_blank">open</a>
      </div>

      <div class="card">
        <h2>Calculator</h2>
        <p>simple everyday utility tool</p>
        <a href="./calculator/index.html" target="_blank">open</a>
      </div>

      <div class="card">
        <h2>Timer</h2>
        <p>clean countdown timer</p>
        <a href="./timer/index.html" target="_blank">open</a>
      </div>

    </div>

    <div class="footer">
      made with intention ✿
    </div>

  </div>

</body>
</html>
