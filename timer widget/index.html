<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greetings</title>

    <!-- Lexend Font -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Lexend', sans-serif;
            font-variant-caps: all-petite-caps;
            color: #ac2a13;
            background-color: #fff;
            text-align: center;
            padding: 50px;
        }

        .widget {
            padding: 20px;
            color: #ac2a13;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            max-width: 95%;
            margin: auto;
            border: 3px solid #ac2a13;
            border-radius: 10px;
            box-shadow: 2px 2px 5px 0px #ac2a13;
        }

        .greet {
            font-size: 3em;
        }

        .date, .clock {
            font-size: 2em;
            font-family: 'Lexend', sans-serif;
        }

        .time {
            display: inline-block;
            min-width: 20px;
        }

        .colon {
            font-size: 1em;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="widget">
        <div class="greet" id="greet"></div>
        <div class="date" id="date"></div>
        <div class="clock">
            <div class="time" id="hour"></div>
            <div class="colon">:</div>
            <div class="time" id="min"></div>
            <div class="colon">:</div>
            <div class="time" id="sec"></div>
        </div>
    </div>

    <script>
        function displayGreetings(today){
            let hrs = today.getHours();
            let name = "Paloma";
            let greet = "";
            if (hrs < 12)
                greet = 'Good Morning ' + name;
            else if (hrs >= 12 && hrs <= 17)
                greet = 'Good Afternoon ' + name;
            else if (hrs >= 17 && hrs <= 24)
                greet = 'Good Evening ' + name;
            document.getElementById('greet').innerHTML = greet;
        }

        function displayDate(today) {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const monthNames = ["January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"];
            let dayName = days[today.getDay()];
            let monthName = monthNames[today.getMonth()];
            let date = today.getDate();
            let year = today.getFullYear();
            document.getElementById('date').innerHTML = `${dayName}, ${monthName} ${date}, ${year}`;
        }

        function displayClock(today) {
            let hour = padZeros(twelveHour(today.getHours()));
            let minutes = padZeros(today.getMinutes());
            let seconds = padZeros(today.getSeconds());
            seconds += (today.getHours() >= 12) ? " PM" : " AM";
            document.getElementById('hour').innerHTML = hour;
            document.getElementById('min').innerHTML = minutes;
            document.getElementById('sec').innerHTML = seconds;
        }

        function twelveHour(hour) {
            if (hour > 12) return hour - 12;
            if (hour === 0) return 12;
            return hour;
        }

        function padZeros(num) {
            return num < 10 ? '0' + num : num;
        }

        function displayWidget() {
            const today = new Date();
            displayGreetings(today);
            displayDate(today);
            displayClock(today);
            setTimeout(displayWidget, 500);
        }

        displayWidget();
    </script>
</body>
</html>
