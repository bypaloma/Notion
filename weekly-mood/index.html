<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weekly Mood</title>

  <!-- Lexend Font -->
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Lexend', lexend;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .widget {
      background: #fff;
      padding: 22px 32px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 420px;
    }

    h2 {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .subtext {
      font-size: 13px;
      color: #777;
      margin-top: 6px;
      margin-bottom: 16px;
    }

    .days {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .day {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }

    .circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: 0.2s ease;
      user-select: none;
    }

    .circle.active {
      border-color: #a78bfa;
      box-shadow: 0 0 8px rgba(167,139,250,0.6);
    }

    .circle:hover {
      transform: scale(1.08);
    }

    /* Reset Button */
    .reset-btn {
      margin-top: 12px;
      padding: 8px 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #f7c6c7; /* blush pink */
      color: #5a3e3e;
      font-family: 'Lexend', sans-serif;
      font-size: 13px;
      transition: 0.2s ease;
    }

    .reset-btn:hover {
      background: #f4b6b8;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="widget">
  <h2>Weekly Mood <span>❤️</span></h2>

  <div class="subtext">
    Keep clicking until you've identified your mood
  </div>

  <button class="reset-btn" onclick="resetMood()">Reset Week</button>

  <div class="days" id="days"></div>
</div>

<script>
  const moods = ["😊", "😐", "😞"];
  const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

  const container = document.getElementById("days");

  let saved = JSON.parse(localStorage.getItem("weeklyMood")) || {};

  function save() {
    localStorage.setItem("weeklyMood", JSON.stringify(saved));
  }

  function resetMood() {
    localStorage.removeItem("weeklyMood");
    location.reload();
  }

  days.forEach((day) => {
    const wrapper = document.createElement("div");
    wrapper.className = "day";

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = day;

    const circle = document.createElement("div");
    circle.className = "circle";

    let moodIndex = saved[day] ?? -1;

    function render() {
      circle.textContent = moodIndex >= 0 ? moods[moodIndex] : "";
      circle.classList.toggle("active", moodIndex >= 0);
    }

    circle.addEventListener("click", () => {
      moodIndex = (moodIndex + 1) % moods.length;
      saved[day] = moodIndex;
      save();
      render();
    });

    render();

    wrapper.appendChild(label);
    wrapper.appendChild(circle);
    container.appendChild(wrapper);
  });
</script>

</body>
</html>
